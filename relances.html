<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Venatus — Relances</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-logo">💎 Venatus</div>
    <nav class="sidebar-nav">
      <a href="index.html" class="sidebar-link"><span>📊</span> Dashboard</a>
      <a href="leads.html" class="sidebar-link"><span>👤</span> Leads</a>
      <a href="relances.html" class="sidebar-link active"><span>⏰</span> Relances</a>
      <a href="pipeline.html" class="sidebar-link"><span>📋</span> Pipeline</a>
      <a href="stats.html" class="sidebar-link"><span>📈</span> Stats Perf</a>
    </nav>
  </aside>

  <div class="main-wrap">
    <div class="main-content">
      <div class="page-header">
        <h1>Relances du jour</h1>
      </div>
      <div class="grid-2">
        <div>
          <div class="section-title-wrap">⏰ À relancer <span id="relances-count" class="badge">0</span></div>
          <div class="card" id="relances-list"><div class="loading">Chargement...</div></div>
        </div>
        <div>
          <div class="section-title-wrap">💬 En discussion +3j <span id="discussions-count" class="badge">0</span></div>
          <div class="card" id="discussions-list"><div class="loading">Chargement...</div></div>
        </div>
      </div>
    </div>
  </div>

  <div id="modal" class="modal hidden">
    <div class="modal-backdrop" onclick="closeModal()"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-pseudo">—</h2>
        <button onclick="closeModal()" class="modal-close">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script type="module">
    import { checkAuth, addSignOutButton } from "./firebase-auth.js";
    import "./relances-init.js";
    checkAuth(() => {
      addSignOutButton();
      window.initRelances();
    });
  </script>
</body>
</html>
